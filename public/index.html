<!DOCTYPE html>
<html>
<head>
  <title>Bot SaaS</title>
  <link rel="stylesheet" href="./css/login.css">
</head>
<body class="auth-body">

<div class="auth-wrapper">

  <div class="auth-card">

    <h2 id="titulo">Iniciar sesión</h2>

    <!-- LOGIN -->
    <div id="loginBox">
      <input id="email_login" placeholder="Email">
      <input id="password_login" type="password" placeholder="Password">

      <button onclick="login()">Entrar</button>

      <div class="divider">o continuar con</div>

      <button class="google-btn">
  <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18">
  Continuar con Google
</button>

      <p class="switch">
        ¿No tienes cuenta? 
        <span onclick="mostrarRegistro()">Regístrate</span>
      </p>
    </div>

    <!-- REGISTRO -->
    <div id="registerBox" class="hidden">
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">

      <button onclick="register()">Crear cuenta</button>

      <div class="divider">o continuar con</div>

      <button class="google-btn">
  <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18">
  Continuar con Google
</button>

      <p class="switch">
        ¿Ya tienes cuenta? 
        <span onclick="mostrarLogin()">Inicia sesión</span>
      </p>
    </div>

  </div>

</div>

<script>

function mostrarRegistro() {
  document.getElementById("loginBox").classList.add("hidden")
  document.getElementById("registerBox").classList.remove("hidden")
  document.getElementById("titulo").innerText = "Registro"
}

function mostrarLogin() {
  document.getElementById("registerBox").classList.add("hidden")
  document.getElementById("loginBox").classList.remove("hidden")
  document.getElementById("titulo").innerText = "Iniciar sesión"
}

async function register() {
  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  const res = await fetch("/auth/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  })

  const data = await res.json()

  if (!res.ok) {
    alert(data.error || "Error")
    return
  }

  alert("Usuario creado ✅")
  mostrarLogin()
}

async function login() {
  const email = document.getElementById("email_login").value
  const password = document.getElementById("password_login").value

  const res = await fetch("/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  })

  const data = await res.json()

  if (!res.ok) {
    alert(data.error || "Credenciales incorrectas ❌")
    return
  }

  localStorage.setItem("cliente_id", data.id)

  await fetch("/iniciar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ cliente_id: data.id })
  })

  window.location.href = "/panel.html"
}

</script>

</body>
</html>
