<!DOCTYPE html>
<html>
<head>
  <title>Tabla</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      margin: 0;
      text-align: center;
    }

    h2 { margin-top: 20px; }

    .filtros { margin: 15px; }

    .filtros button {
      margin: 5px;
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1e293b;
      color: white;
      transition: 0.3s;
    }

    .filtros button:hover {
      background: #334155;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 10px;
      max-width: 600px;
      margin: 20px auto;
    }

    .item {
      padding: 14px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .item:hover {
      transform: scale(1.08);
    }

    .disponible { background: #e5e7eb; color: black; }
    .reservado { background: rgba(239,68,68,0.3); color: transparent; }
    .pagado { background: rgba(34,197,94,0.4); color: transparent; }

    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    .stat {
      background: #020617;
      padding: 10px 15px;
      border-radius: 10px;
      font-size: 14px;
    }

    .lista {
      max-width: 600px;
      margin: 20px auto;
      text-align: left;
      background: #020617;
      padding: 15px;
      border-radius: 12px;
    }

    .item-lista {
      padding: 6px;
      border-bottom: 1px solid #334155;
    }
  </style>
</head>

<body>

<h2 id="titulo">Cargando...</h2>

<div class="filtros">
  <button onclick="filtro='todos'; cargar()">Todos</button>
  <button onclick="filtro='disponible'; cargar()">Disponibles</button>
  <button onclick="filtro='reservado'; cargar()">Reservados</button>
  <button onclick="filtro='pagado'; cargar()">Pagados</button>
</div>

<div class="grid" id="tabla"></div>

<div class="lista" id="lista"></div>
<div class="stats">
  <div class="stat" id="disp"></div>
  <div class="stat" id="res"></div>
  <div class="stat" id="pag"></div>
</div>

<h3>📋 Detalle</h3>
<div class="lista" id="lista"></div>


<script>
const params = new URLSearchParams(window.location.search)
const grupo = params.get("g")

let filtro = "todos"
let cargando = false

async function cargar() {

  if (cargando) return
  cargando = true

  try {
    const res = await fetch(`/tabla/${grupo}`)
    const data = await res.json()

    document.getElementById("titulo").innerText = data.grupo || "Sin nombre"

    const cont = document.getElementById("tabla")
    const lista = document.getElementById("lista")

    cont.innerHTML = ""
    lista.innerHTML = ""

    // 🔥 CONTADORES
    let total = 0
    let disponibles = 0
    let reservados = 0
    let pagados = 0

    data.tabla.forEach(n => {

      total++

      if (n.estado === "disponible") disponibles++
      if (n.estado === "reservado") reservados++
      if (n.estado === "pagado") pagados++

      if (filtro !== "todos" && n.estado !== filtro) return

      const div = document.createElement("div")
      div.className = `item ${n.estado}`
      div.innerText = n.numero

      div.onclick = async () => {

        let accion = ""
        let usuario = null

        if (n.estado === "disponible") {
          const nombre = prompt("Nombre del usuario")
          if (!nombre) return

          accion = "reservar"
          usuario = nombre
        }

        else if (n.estado === "reservado") {
          if (!confirm(`¿Marcar ${n.numero} como pagado?`)) return
          accion = "pagar"
        }

        else if (n.estado === "pagado") {
          if (!confirm(`¿Liberar ${n.numero}?`)) return
          accion = "liberar"
        }

        div.style.opacity = "0.5"

        await fetch("/accion", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            grupo_id: grupo,
            numero: parseInt(n.numero),
            accion,
            usuario
          })
        })

        cargar()
      }

      cont.appendChild(div)

      if (n.usuario) {
        const item = document.createElement("div")
        item.className = "item-lista"
        item.innerText = `${n.numero} → ${n.usuario} (${n.estado})`
        lista.appendChild(item)
      }

    })

    // 🔥 ACTUALIZAR CONTADORES
  
    document.getElementById("disp").innerText = `Disponibles: ${disponibles}`
    document.getElementById("res").innerText = `Reservados: ${reservados}`
    document.getElementById("pag").innerText = `Pagados: ${pagados}`

  } catch (err) {
    console.error("Error:", err)
  }

  cargando = false
}

setInterval(cargar, 3000)
cargar()
</script>

</body>
</html>
