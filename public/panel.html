<!DOCTYPE html>
<html>
<head>
  <title>Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <button onclick="logout()" style="float:right;">🚪 Cerrar sesión</button>

  <h1>📊 Panel</h1>

  <p id="id"></p>

  <div class="card">
    <h3>📡 Estado</h3>
    <p id="estado">Cargando...</p>

    <h3>📲 QR</h3>
    <img id="qr" width="200"/>
  </div>

  <h3>👥 Grupos</h3>
  <div id="grupos"></div>

  <h3>⚙️ Mensajes</h3>

  <div class="card">
    <input id="msg_reservado" placeholder="Mensaje reservado" />
    <input id="msg_ocupado" placeholder="Mensaje ocupado" />
    <input id="msg_invalido" placeholder="Mensaje inválido" />

    <button onclick="guardarMensajes()">💾 Guardar</button>
  </div>

  <h3>🧠 Logs</h3>
  <div id="logs" class="logs"></div>

</div>

<script>
const cliente_id = localStorage.getItem("cliente_id")

if (!cliente_id) {
  alert("No hay sesión ❌")
  window.location.href = "/"
}

document.getElementById("id").innerText = cliente_id

function logout() {
  localStorage.removeItem("cliente_id")
  window.location.href = "/"
}

// ================= ESTADO =================

async function actualizar() {
  try {
    const res = await fetch("/estado/" + cliente_id)
    const data = await res.json()

    document.getElementById("estado").innerText = data.estado

    if (data.qr) {
      document.getElementById("qr").src = data.qr
    }

    document.getElementById("logs").innerText = data.logs.join("\n")

  } catch (err) {
    console.error(err)
  }
}

// ================= GRUPOS =================

async function cargarGrupos() {
  const res = await fetch("/grupos/" + cliente_id)
  const data = await res.json()

  const contenedor = document.getElementById("grupos")
  contenedor.innerHTML = ""

  data.forEach(g => {
    const div = document.createElement("div")
    div.className = "card"

    // 🔥 IMPORTANTE: cambia localhost por tu IP
    const linkTabla = `http://209.38.77.179:3000/tabla.html?g=${g.id}`

    div.innerHTML = `
      <h3>📌 ${g.nombre || "Sin nombre"}</h3>
      <p>🆔 ${g.id}</p>

      <p class="estado ${g.permitido ? 'activo' : 'bloqueado'}">
        ${g.permitido ? '✅ Activo' : '🔒 Bloqueado'}
      </p>

      ${
        g.permitido
          ? `
            <div style="margin-top:10px;">
              <p>📊 Tabla:</p>

              <input value="${linkTabla}" readonly style="width:100%; padding:5px;" />

              <div style="margin-top:5px;">
                <button onclick="copiar('${linkTabla}')">📋 Copiar</button>
                <button onclick="window.open('${linkTabla}')">🔗 Abrir</button>
              </div>
            </div>
          `
          : `
            <button onclick="activar('${g.id}')">💰 Activar</button>
          `
      }
    `

    contenedor.appendChild(div)
  })
}

// ================= MENSAJES =================

// 🔥 CARGAR MENSAJES GUARDADOS
async function cargarMensajes() {
  const res = await fetch("/grupos/" + cliente_id) // usamos esto como base

  // ⚠️ mejor luego hacer endpoint /usuario
  const db = await fetch("/db.json").then(r => r.json()).catch(() => null)

  if (!db) return

  const usuario = db.usuarios[cliente_id]
  if (!usuario || !usuario.mensajes) return

  document.getElementById("msg_reservado").value = usuario.mensajes.reservado || ""
  document.getElementById("msg_ocupado").value = usuario.mensajes.ocupado || ""
  document.getElementById("msg_invalido").value = usuario.mensajes.invalido || ""
}

// 🔥 GUARDAR MENSAJES
async function guardarMensajes() {

  const mensajes = {
    reservado: document.getElementById("msg_reservado").value,
    ocupado: document.getElementById("msg_ocupado").value,
    invalido: document.getElementById("msg_invalido").value
  }

  await fetch("/guardar-mensajes", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      cliente_id,
      mensajes
    })
  })

  alert("Mensajes guardados ✅")
}

// ================= ACCIONES =================

async function activar(grupo_id) {
  await fetch("/activar/" + grupo_id)
  alert("Grupo activado ✅")
  cargarGrupos()
}

function copiar(texto) {
  navigator.clipboard.writeText(texto)
  alert("Link copiado ✅")
}

// ================= INIT =================

actualizar()
cargarGrupos()
cargarMensajes()

setInterval(() => {
  actualizar()
  cargarGrupos()
}, 2000)
</script>

</body>
</html>
